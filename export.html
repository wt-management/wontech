<style>
html{color-scheme:light}
*{box-sizing:border-box}
body{font-family:'Pretendard','Noto Sans KR',sans-serif;background:#eef2f7;color:#1e293b;margin:0}
.topbar{position:sticky;top:0;z-index:50;background:#0f172a;color:#e2e8f0;display:flex;align-items:center;gap:14px;padding:11px 20px;box-shadow:0 1px 8px rgba(0,0,0,.18)}
.tb-logo{width:30px;height:24px;display:flex;align-items:flex-end;gap:2px}
.tb-logo span{flex:1;background:#f97316;border-radius:1px}
.tb-title{font-weight:800;font-size:15px;color:#fff;letter-spacing:-.4px}
.tb-sub{font-size:11px;color:#94a3b8;margin-left:-8px}
.tb-spacer{flex:1}
.tb-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:#cbd5e1;font-size:12px;padding:6px 13px;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}

.tb-user{font-size:12px;color:#cbd5e1;display:flex;align-items:center;gap:8px}
.tb-av{width:30px;height:30px;border-radius:50%;background:#0f766e;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.wrap{max-width:1320px;margin:0 auto;padding:20px 22px 70px}

.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:18px}
.kpi{background:#fff;border-radius:16px;padding:18px 20px;box-shadow:0 2px 10px rgba(15,23,42,.06);position:relative;overflow:hidden}
.kpi .tag{font-size:12px;font-weight:700;color:#64748b}
.kpi .tgt{font-size:13px;font-weight:800;margin-left:6px}
.kpi .rate{font-size:2.0rem;font-weight:800;line-height:1;margin:10px 0 2px}
.kpi .amt{font-size:12.5px;color:#475569;font-variant-numeric:tabular-nums}
.kpi .sub{font-size:11.5px;margin-top:3px;font-weight:700}
.gauge{height:9px;background:#eef2f7;border-radius:6px;overflow:hidden;margin-top:12px}
.gauge>div{height:100%;border-radius:6px;transition:width .5s}
.kpi.done{background:linear-gradient(180deg,#fef2f2,#fff)}
.kpi.done .tgt{color:#dc2626}

.bar{background:#fff;border-radius:14px;padding:13px 18px;box-shadow:0 2px 10px rgba(15,23,42,.06);display:flex;flex-wrap:wrap;align-items:center;gap:16px 22px;margin-bottom:18px}
.bar .fld{display:flex;align-items:center;gap:8px}
.bar label{font-size:12.5px;font-weight:700;color:#334155;white-space:nowrap}
.bar input{font-size:13px;padding:5px 9px;border:1px solid #cbd5e1;border-radius:8px;width:140px;text-align:right;font-variant-numeric:tabular-nums}
.bar .prov{margin-left:auto;font-size:12px;color:#64748b}
.bar .prov b{color:#b45309;font-size:14px}

.grid2{display:grid;grid-template-columns:1.15fr .85fr;gap:16px;margin-bottom:18px}
.card{background:#fff;border-radius:14px;padding:14px 16px 16px;box-shadow:0 2px 10px rgba(15,23,42,.06)}
.card h3{font-size:13.5px;font-weight:800;margin:0 0 10px;color:#0f172a;display:flex;align-items:center;gap:7px}
.card h3 i{color:#0f766e}

.tbls{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.etbl{width:100%;border-collapse:collapse;font-size:12px;font-variant-numeric:tabular-nums}
.etbl caption{caption-side:top;font-size:13px;font-weight:800;color:#0f172a;text-align:left;padding:0 0 9px}
.etbl caption .lv{color:#0f766e}
.etbl th{background:#e8eef6;color:#334155;font-weight:700;padding:6px 9px;border:1px solid #d4dde8;font-size:11.5px;height:46px;vertical-align:middle;line-height:1.25}
.etbl td{padding:5px 9px;border:1px solid #e6ebf1;text-align:right}
.etbl td.mon{text-align:center;color:#475569}
.etbl tr.sub td{background:#f1f5f9;font-weight:700}
.etbl tr.tot td{background:#e8eef6;font-weight:800}
.etbl tr.prov td{background:#fffbe6;font-style:italic;color:#b45309}
.etbl tr.res td{font-weight:800}
.etbl tr.res.short td{background:#fff36b}
.up{color:#dc2626}.down{color:#2563eb}
.yoy td{font-size:11px}
.muted{color:#94a3b8}

.kita{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.kita .k{background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 2px 10px rgba(15,23,42,.06);text-align:center}
.kita .k .y{font-size:12px;color:#64748b;font-weight:700}
.kita .k .v{font-size:1.35rem;font-weight:800;margin-top:4px;color:#0f172a}
.kita .k .d{font-size:11.5px;margin-top:3px;font-weight:700}

#login-screen{position:fixed;inset:0;background:#0f172a;display:none;align-items:center;justify-content:center;z-index:200}
.login-box{background:#fff;border-radius:16px;padding:34px 30px;width:340px;box-shadow:0 10px 40px rgba(0,0,0,.3)}
#app-loading{position:fixed;inset:0;background:#eef2f7;display:flex;align-items:center;justify-content:center;z-index:300;font-size:14px;color:#64748b}
.modal-back{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:flex-start;justify-content:center;z-index:150;overflow-y:auto;padding:40px 16px}
.modal-card{background:#fff;border-radius:14px;width:min(760px,100%);padding:20px 22px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.mgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px 10px}
.mgrid .mi{display:flex;flex-direction:column;gap:2px}
.mgrid .mi label{font-size:10.5px;color:#64748b;font-weight:700}
.mgrid .mi input{font-size:12px;padding:4px 6px;border:1px solid #cbd5e1;border-radius:6px;text-align:right;font-variant-numeric:tabular-nums}
@media(max-width:1100px){.grid2{grid-template-columns:1fr}.tbls{grid-template-columns:1fr}.kpi-row,.kita{grid-template-columns:1fr}.mgrid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:820px){
  body{overflow-x:hidden}
  .wrap{padding:14px 12px 60px}
  .grid2,.tbls,.kpi-row,.kita{grid-template-columns:1fr}
  .mgrid{grid-template-columns:repeat(2,1fr)}

const usd = v => '$'+Math.round(Number(v)||0).toLocaleString();
const won = v => (Number(v)||0).toLocaleString()+'원';
const cycleMonths = start => { // 'YYYY-MM' 시작 → 12개월 키 배열 (7월~익년6월)
  const [y,m]=start.split('-').map(Number); const out=[];
  for(let i=0;i<12;i++){ let yy=y+Math.floor((m-1+i)/12), mm=(m-1+i)%12+1; out.push(yy+'-'+String(mm).padStart(2,'0')); }
  return out;
};
const monLabel = key => { const [y,m]=key.split('-'); return y.slice(2)+'년 '+Number(m)+'월'; };
const prevYearKey = key => { const [y,m]=key.split('-'); return (Number(y)-1)+'-'+m; };

// 잠정 환산액 (미확정월)
function provUSD(){
  if(DATA.provOverrideUSD!=null && DATA.provOverrideUSD!=='') return Number(DATA.provOverrideUSD)||0;
  const r=Number(DATA.rate)||0, k=(Number(DATA.provAccKRW)||0)+(Number(DATA.provPendKRW)||0);
  return r>0?k/r:0;
}
// 차수의 한 월 값: 확정값 우선, 없고 잠정월이면 환산액
function monVal(cyc,key){
  const v=cyc.months[key];
  if(v!==undefined && v!==null && v!=='') return Number(v);
  if(key===DATA.provMonth) return provUSD();
  return 0;
}
function isProv(cyc,key){
  const v=cyc.months[key];
  return (v===undefined||v===null||v==='') && key===DATA.provMonth && provUSD()>0;
}
function cycleTotal(cyc){ return cycleMonths(cyc.start).reduce((s,k)=>s+monVal(cyc,k),0); }

// ── 렌더 ─────────────────────────────────────────────────
function render(){
  document.getElementById('in-rate').value=DATA.rate;
  document.getElementById('in-acckrw').value=DATA.provAccKRW||'';
  document.getElementById('in-pendkrw').value=DATA.provPendKRW||'';
  document.getElementById('in-override').value=(DATA.provOverrideUSD??'');
  document.getElementById('ov-lbl').textContent=monLabel(DATA.provMonth)+' 조정값 ($)';
  document.getElementById('prov-month').textContent=monLabel(DATA.provMonth);
  updateProvDisplay();
  renderKPI(); renderTables(); renderKITA(); renderCharts();
}
function updateProvDisplay(){
  document.getElementById('prov-usd').textContent=usd(provUSD());
  const ov=(DATA.provOverrideUSD!=null&&DATA.provOverrideUSD!=='');
  const acc=Number(DATA.provAccKRW)||0, pend=Number(DATA.provPendKRW)||0, r=Number(DATA.rate)||0;
  document.getElementById('prov-calc').textContent= ov?'(수기 조정)':('(회계+미반영 '+(acc+pend).toLocaleString()+'원 ÷ '+r.toLocaleString()+')');
}

function renderKPI(){
  const el=document.getElementById('kpi-row'); el.innerHTML='';
  const colors=['#0891b2','#0f766e','#6366f1'];
  DATA.cycles.forEach((cyc,i)=>{
    const tot=cycleTotal(cyc), rate=tot/cyc.target*100, diff=tot-cyc.target, done=diff>=0, empty=tot<=0;
    const startLbl=monLabel(cycleMonths(cyc.start)[0]);
    el.insertAdjacentHTML('beforeend',`
      <div class="kpi ${done&&!empty?'done':''}">
        <div><span class="tag">${cyc.title}</span><span class="tgt">${cyc.label}</span></div>
        <div class="rate" style="color:${empty?'#94a3b8':done?'#dc2626':colors[i]}">${empty?'—':rate.toFixed(0)}${empty?'':'<span style="font-size:1.1rem">%</span>'}</div>
        <div class="amt">실적 ${usd(tot)} / 목표 ${usd(cyc.target)}</div>
        <div class="sub" style="color:${empty?'#94a3b8':done?'#dc2626':'#2563eb'}">${empty?(startLbl+' 시작'):(done?'초과분 '+usd(diff):'과부족 -'+usd(Math.abs(diff)))}</div>
        <div class="gauge"><div style="width:${empty?0:Math.min(rate,100)}%;background:${done?'#dc2626':colors[i]}"></div></div>
      </div>`);
  });
}

function renderTables(){
  const el=document.getElementById('tbls'); el.innerHTML='';
  const yoyBase=DATA.cycles.find(c=>c.id==='c2026_70');     // 전년동월 = 7천만불 차수
  const yoyPrev=DATA.cycles.find(c=>c.id==='c2025');
  DATA.cycles.forEach(cyc=>{
    const keys=cycleMonths(cyc.start);
    const h1=keys.slice(0,6).reduce((s,k)=>s+monVal(cyc,k),0);
    const h2=keys.slice(6).reduce((s,k)=>s+monVal(cyc,k),0);
    const tot=h1+h2, diff=tot-cyc.target, done=diff>=0;
    const showYoY = (cyc.id==='c2026_70');
    let rows='';
    const rowFor=(k,extraCls)=>{
      const prov=isProv(cyc,k);
      let yoy='';
      if(showYoY){ const pv=monVal(yoyPrev,prevYearKey(k)); yoy=yoyCells(monVal(cyc,k)-pv, pct(monVal(cyc,k),pv)); }
      return `<tr class="${prov?'prov':''}${extraCls||''}"><td class="mon">${monLabel(k)}${prov?' <span style="font-size:9px">잠정</span>':''}</td><td>${usd(monVal(cyc,k))}</td>${showYoY?yoy:''}</tr>`;
    };
    const subRow=(label,val,prevVal)=>{
      let yoy=''; if(showYoY) yoy=yoyCells(val-prevVal, pct(val,prevVal));
      return `<tr class="sub"><td class="mon">${label}</td><td>${usd(val)}</td>${showYoY?yoy:''}</tr>`;
    };
    keys.slice(0,6).forEach(k=>rows+=rowFor(k));
    const p1=cycleMonths(yoyPrev.start).slice(0,6).reduce((s,k)=>s+monVal(yoyPrev,k),0);
    rows+=subRow(monLabel(keys[0]).slice(0,3)+'하반기 소계', h1, p1);
    keys.slice(6).forEach(k=>rows+=rowFor(k));
    const p2=cycleMonths(yoyPrev.start).slice(6).reduce((s,k)=>s+monVal(yoyPrev,k),0);
    rows+=subRow(monLabel(keys[6]).slice(0,3)+'상반기 소계', h2, p2);
    const ptot=p1+p2;
    rows+=`<tr class="tot"><td class="mon">총계</td><td>${usd(tot)}</td>${showYoY?yoyCells(tot-ptot,pct(tot,ptot)):''}</tr>`;
    rows+=`<tr class="res ${done?'':'short'}"><td class="mon">${done?'초과분':'과부족'}</td><td class="${done?'up':'down'}">${done?usd(diff):'-'+usd(Math.abs(diff))}</td>${showYoY?'<td></td><td></td>':''}</tr>`;
    rows+=`<tr class="res"><td class="mon">달성율</td><td>${(tot/cyc.target*100).toFixed(0)}%</td>${showYoY?'<td></td><td></td>':''}</tr>`;
    el.insertAdjacentHTML('beforeend',`
      <table class="etbl">
        <caption>${cyc.title} <span class="lv">(${cyc.label})</span></caption>
        <thead><tr><th>년/월</th><th>금액</th>${showYoY?'<th>전년동월<br>증감액</th><th>증감율</th>':''}</tr></thead>
        <tbody>${rows}</tbody>
      </table>`);
  });
}
function pct(v,p){ return p>0?(v/p-1)*100:null; }
function yoyCells(amt,p){
  const up=amt>=0, cls=up?'up':'down', ar=up?'▲':'▼';
  const pc = p===null?'-':ar+Math.abs(p).toFixed(0)+'%';
  return `<td class="${cls}">${ar} ${Math.abs(Math.round(amt)).toLocaleString()}</td><td class="${cls}">${pc}</td>`;
}

function renderKITA(){
  const el=document.getElementById('kita'); el.innerHTML='';
  DATA.kita.forEach((k,i)=>{
    const prev=DATA.kita[i-1];
    let d=''; if(prev){ const g=k.amount-prev.amount, up=g>=0; d=`<div class="d ${up?'up':'down'}">${up?'▲':'▼'} ${usd(Math.abs(g))} (${(k.amount/prev.amount*100-100).toFixed(0)}%)</div>`; }
    el.insertAdjacentHTML('beforeend',`<div class="k"><div class="y">${k.year}년 무역실적</div><div class="v">${usd(k.amount)}</div>${d}</div>`);
  });
}

function renderCharts(){
  const cur=DATA.cycles.find(c=>c.id==='c2026_70'), prev=DATA.cycles.find(c=>c.id==='c2025'), stretch=DATA.cycles.find(c=>c.id==='c2026_100');
  const keys=cycleMonths(cur.start), labels=keys.map(monLabel);
  // 누적
  let acc=0; const cum=keys.map(k=>{acc+=monVal(cur,k);return Math.round(acc);});
  if(_chCum) _chCum.destroy();
  _chCum=new Chart(document.getElementById('ch-cum'),{type:'line',
    data:{labels,datasets:[
      {label:'누적 실적',data:cum,borderColor:'#0f766e',backgroundColor:'rgba(15,118,110,.12)',fill:true,tension:.25,pointRadius:2},
      {label:'7천만불 목표',data:keys.map(()=>cur.target),borderColor:'#dc2626',borderDash:[6,4],pointRadius:0,fill:false},
      {label:'1억불 목표',data:keys.map(()=>stretch.target),borderColor:'#6366f1',borderDash:[3,4],pointRadius:0,fill:false}
    ]},
    options:{plugins:{legend:{labels:{font:{size:11},boxWidth:12}}},scales:{y:{ticks:{callback:v=>'$'+(v/1e6)+'M',font:{size:10}}},x:{ticks:{font:{size:9},maxRotation:0}}}}});
  // 월별 비교
  if(_chMon) _chMon.destroy();
  _chMon=new Chart(document.getElementById('ch-mon'),{type:'bar',
    data:{labels,datasets:[
      {label:'전년 동월',data:keys.map(k=>monVal(prev,prevYearKey(k))),backgroundColor:'#cbd5e1'},
      {label:'금년',data:keys.map(k=>monVal(cur,k)),backgroundColor:'#0f766e'}
    ]},
    options:{plugins:{legend:{labels:{font:{size:11},boxWidth:12}}},scales:{y:{ticks:{callback:v=>'$'+(v/1e6)+'M',font:{size:10}}},x:{ticks:{font:{size:9},maxRotation:0}}}}});
}

// ── 환율/잠정 입력 ───────────────────────────────────────
function onRate(){
  DATA.rate=Number(document.getElementById('in-rate').value)||0;
  DATA.provAccKRW=Number(document.getElementById('in-acckrw').value)||0;
  DATA.provPendKRW=Number(document.getElementById('in-pendkrw').value)||0;
  const ovv=document.getElementById('in-override').value.trim();
  DATA.provOverrideUSD = ovv===''?'':Number(ovv);
  updateProvDisplay();
  renderKPI(); renderTables(); renderCharts(); persist();
}

// ── 편집 모달 ────────────────────────────────────────────
function openEdit(){
  const body=document.getElementById('edit-body'); body.innerHTML='';
  DATA.cycles.forEach(cyc=>{
    const keys=cycleMonths(cyc.start);
    let inputs='';
    keys.forEach(k=>{ const v=cyc.months[k]; inputs+=`<div class="mi"><label>${monLabel(k)}</label><input data-cyc="${cyc.id}" data-k="${k}" type="number" value="${v===undefined?'':v}" placeholder="미확정"></div>`; });
    body.insertAdjacentHTML('beforeend',`<div style="font-size:13px;font-weight:800;margin:12px 0 7px;color:#0f766e">${cyc.title} (${cyc.label}) · 목표 ${usd(cyc.target)}</div><div class="mgrid">${inputs}</div>`);
  });
  document.getElementById('edit-modal').style.display='flex';
}
function closeEdit(){ document.getElementById('edit-modal').style.display='none'; }
function saveEdit(){
  document.querySelectorAll('#edit-body input').forEach(inp=>{
    const cyc=DATA.cycles.find(c=>c.id===inp.dataset.cyc), k=inp.dataset.k, val=inp.value.trim();
    if(val==='') delete cyc.months[k]; else cyc.months[k]=Number(val);
  });
  closeEdit(); render(); persist();
}

// ── 저장/로드 (localStorage + Supabase) ─────────────────
function persist(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(DATA)); }catch(_){}
  DATA.updatedAt=new Date().toISOString();
  _sb.from('export_tower').upsert({key:'main',data:DATA,updated_at:DATA.updatedAt}).then(({error})=>{
    if(error) console.warn('cloud save 보류(테이블 없음?):',error.message);
  });
}
async function loadData(){
  let saved=null;
  try{ const {data,error}=await _sb.from('export_tower').select('data').eq('key','main').maybeSingle(); if(!error&&data&&data.data) saved=data.data; }catch(_){}
  if(!saved){ try{ const ls=localStorage.getItem(LS_KEY); if(ls) saved=JSON.parse(ls); }catch(_){} }
  // 차수 구조(기간·목표)는 항상 코드(DEFAULT_DATA) 기준, 저장본은 월별수치·환율·잠정값만 덮어씀
  const base=JSON.parse(JSON.stringify(DEFAULT_DATA));
  if(saved){
    if(saved.rate!=null) base.rate=saved.rate;
    if(saved.provMonth) base.provMonth=saved.provMonth;
    base.provAccKRW   = saved.provAccKRW ?? saved.provKRW ?? base.provAccKRW;   // 구버전 provKRW 마이그레이션
    base.provPendKRW  = saved.provPendKRW ?? base.provPendKRW;
    base.provOverrideUSD = saved.provOverrideUSD ?? base.provOverrideUSD;
    if(Array.isArray(saved.kita)) base.kita=saved.kita;
    if(Array.isArray(saved.cycles)) saved.cycles.forEach(sc=>{
      const bc=base.cycles.find(c=>c.id===sc.id);
      if(bc && sc.months) bc.months=sc.months;
    });
  }
  DATA=base;
}

// ── 로그인 ───────────────────────────────────────────────
async function doLogin(){
  const email=(document.getElementById('login-email').value||'').trim().toLowerCase();
  const pw=(document.getElementById('login-pw').value||'').trim();
  const btn=document.getElementById('login-btn'), err=document.getElementById('login-error');
  if(!email||!pw){err.textContent='이메일과 비밀번호를 입력하세요.';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='로그인 중...';err.style.display='none';
  const {data,error}=await _sb.auth.signInWithPassword({email,password:pw});
  if(error){btn.disabled=false;btn.textContent='로그인';err.textContent='이메일 또는 비밀번호가 올바르지 않습니다.';err.style.display='block';return;}
  await afterLogin(data.session.user);
}
async function doLogout(){
  await _sb.auth.signOut();
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-btn').disabled=false;
  document.getElementById('login-btn').textContent='로그인';
}
function toggleSites(){ const d=document.getElementById('site-dd'); d.style.display=d.style.display==='block'?'none':'block'; }
async function goSite(base){ let u=base; try{ const {data:{session:s}}=await _sb.auth.getSession(); if(s) u+='#at='+encodeURIComponent(s.access_token)+'&rt='+encodeURIComponent(s.refresh_token); }catch(_){} location.href=u; }
document.addEventListener('click',function(e){ const dd=document.getElementById('site-dd'); if(dd&&dd.style.display==='block'&&!e.target.closest('#site-dd')&&!e.target.closest('[onclick*="toggleSites"]')) dd.style.display='none'; });

async function afterLogin(user){
  const {data:profile}=await _sb.from('crm_profiles').select('display_name,access,role,position,dept').eq('id',user.id).maybeSingle();
  const access=profile?.access||'';
  const isMaster=user.email==='pmw0406@gmail.com';
  const allowed=isMaster||profile?.role==='admin'||access.includes('all')||access.includes('intl');
  if(!allowed){
    await _sb.auth.signOut();
    const err=document.getElementById('login-error');
    err.textContent='수출의 탑 접근 권한이 없습니다. (해외영업 권한 필요)';err.style.display='block';
    document.getElementById('login-btn').disabled=false;document.getElementById('login-btn').textContent='로그인';
    document.getElementById('login-screen').style.display='flex';return;
  }
  _user={email:user.email,name:profile?.display_name||user.email.split('@')[0],position:profile?.position||'',dept:profile?.dept||''};
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('u-nm').textContent=_user.position?(_user.name+' '+_user.position):_user.name;
  document.getElementById('u-em').textContent=_user.dept||_user.email;
  document.getElementById('u-av').textContent=(_user.name||'?')[0].toUpperCase();
  await loadData();
  render();
}

// ── 세션 부팅 ────────────────────────────────────────────
(async()=>{
  const hash=window.location.hash;
  if(hash){
    const hp=new URLSearchParams(hash.slice(1));
    const at=hp.get('at'),rt=hp.get('rt');
    if(at&&rt){ await _sb.auth.setSession({access_token:decodeURIComponent(at),refresh_token:decodeURIComponent(rt)}); history.replaceState(null,'',location.pathname); }
  }
  const {data:{session}}=await _sb.auth.getSession();
  document.getElementById('app-loading').style.display='none';
  if(session) await afterLogin(session.user);
  else document.getElementById('login-screen').style.display='flex';
})();

(function(){
  var IDLE_MS=30*60*1000, _it;
  function _logout(){ if(typeof doLogout==='function'){ doLogout(); return; } try{ _sb.auth.signOut().then(function(){ location.reload(); }); }catch(e){ location.reload(); } }
  function _fire(){ try{ if(typeof _sb!=='undefined' && _sb && _sb.auth && _sb.auth.getSession){ _sb.auth.getSession().then(function(r){ var s=r&&r.data&&r.data.session; var _noAutoLogout=['pmw0406@gmail.com','son8704@wontech.com','megan@wontech.com','hyerin0519@wontech.com','tndnjs890@wontech.com']; if(s&&s.user&&_noAutoLogout.indexOf(s.user.email)>=0){ _arm(); return; } if(s){ _logout(); } else { _arm(); } }).catch(function(){ _logout(); }); } else { _logout(); } }catch(e){ _logout(); } }
  function _arm(){ clearTimeout(_it); _it=setTimeout(_fire, IDLE_MS); }
  ['mousemove','mousedown','keydown','touchstart','scroll','click','wheel'].forEach(function(ev){ document.addEventListener(ev, _arm, {passive:true, capture:true}); });
  _arm();
})();
