<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회계 매출자료 업로드 — 원텍 통합</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="wtu_engine.js"></script>
<style>
  body{font-family:'Noto Sans KR',sans-serif;background:#f4f6fa;color:#1f2937;}
  .wrap{max-width:840px;margin:0 auto;padding:28px 16px 60px;}
  .card-box{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:22px;margin-bottom:18px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
  h1{font-size:20px;font-weight:800;margin:0 0 4px;}
  .sub{color:#6b7280;font-size:13px;}
  .drop{border:2px dashed #cbd5e1;border-radius:12px;padding:34px;text-align:center;cursor:pointer;transition:.15s;background:#fafbfd;}
  .drop:hover,.drop.drag{border-color:#2563eb;background:#eff4ff;}
  .drop i{font-size:34px;color:#94a3b8;}
  table.sum{width:100%;border-collapse:collapse;font-size:14px;}
  table.sum td{padding:8px 10px;border-bottom:1px solid #f1f3f7;}
  table.sum td:first-child{color:#6b7280;width:42%;}
  table.sum td:last-child{font-weight:700;text-align:right;}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:12px;font-weight:700;}
  .pill.ok{background:#dcfce7;color:#166534;} .pill.warn{background:#fee2e2;color:#991b1b;}
  .mono{font-variant-numeric:tabular-nums;}
  #log{font-size:12px;color:#64748b;white-space:pre-wrap;font-family:ui-monospace,monospace;max-height:160px;overflow:auto;}
  .btn-confirm{font-weight:700;padding:11px 0;}
  .monrow{font-size:12px;color:#475569;font-variant-numeric:tabular-nums;}
</style>
</head>
<body>
<div class="wrap">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
    <svg viewBox="0 0 310 205" xmlns="http://www.w3.org/2000/svg" fill="#ff4500" style="width:30px;height:20px"><rect x="0" y="0" width="95" height="95" rx="22"/><rect x="107" y="0" width="95" height="95" rx="22"/><rect x="215" y="0" width="95" height="95" rx="22"/><rect x="53" y="110" width="95" height="95" rx="22"/><rect x="161" y="110" width="95" height="95" rx="22"/></svg>
    <div><h1>회계 매출자료 업로드</h1><div class="sub">재무팀 일일 회계원본(상품/제품/기타매출) → 전 사이트 데이터 갱신</div></div>
  </div>

  <!-- 로그인 -->
  <div id="loginBox" class="card-box" style="display:none;max-width:380px;margin:60px auto;">
    <h1 style="font-size:16px;margin-bottom:14px">로그인</h1>
    <input id="email" type="email" class="form-control mb-2" placeholder="이메일">
    <input id="pw" type="password" class="form-control mb-3" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-primary w-100" onclick="doLogin()">로그인</button>
    <div id="loginErr" class="text-danger mt-2" style="font-size:12px"></div>
  </div>

  <!-- 메인 -->
  <div id="appBox" style="display:none">
    <div class="card-box">
      <div id="drop" class="drop">
        <i class="bi bi-cloud-arrow-up"></i>
        <div style="margin-top:10px;font-weight:600">엑셀 파일을 끌어다 놓거나 클릭해서 선택</div>
        <div class="sub" style="margin-top:4px">예: 원텍_2026년 6월 26일.xlsx</div>
        <input id="file" type="file" accept=".xlsx,.xls" style="display:none">
      </div>
      <div id="fileInfo" class="sub" style="margin-top:10px;display:none"></div>
    </div>

    <div id="previewBox" class="card-box" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <h1 style="font-size:16px;margin:0">검증 미리보기</h1>
        <span id="dermakPill"></span>
      </div>
      <div class="sub" id="updLine" style="margin-bottom:12px"></div>
      <table class="sum"><tbody id="sumBody"></tbody></table>
      <div style="margin-top:12px;padding-top:12px;border-top:1px dashed #e5e7eb">
        <div class="monrow"><b>국내소모품 월별</b> <span id="mCons"></span></div>
        <div class="monrow"><b>국내제품 월별</b> <span id="mDev"></span></div>
        <div class="monrow"><b>해외 월별</b> <span id="mIntl"></span></div>
      </div>
      <div class="alert alert-warning" style="margin:16px 0 0;font-size:13px;padding:10px 12px">
        <i class="bi bi-exclamation-triangle me-1"></i> 확정하면 <b>라이브 cons_cache(main·device·intl)</b>가 즉시 교체됩니다. 모든 사이트(한국·해외·종합)에 반영됩니다. 2025(전년)는 보존됩니다.
      </div>
      <button id="confirmBtn" class="btn btn-success w-100 btn-confirm mt-3" onclick="doWrite()"><i class="bi bi-database-check me-1"></i> cons_cache에 적재 (확정)</button>
    </div>

    <div class="card-box">
      <div class="sub" style="margin-bottom:6px"><i class="bi bi-terminal me-1"></i>로그</div>
      <div id="log"></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://mhfacbsittfdkknwybhc.supabase.co';
const SUPABASE_KEY='sb_publishable_aPMOOWAlyJlMcP1ZM_gpPA_jlrcvCRd';
const _sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let BUILT=null; // 마지막 빌드 결과
function log(m){ const el=document.getElementById('log'); el.textContent+=(el.textContent?'\n':'')+m; el.scrollTop=el.scrollHeight; }
const e8=x=>Math.round(x/1e8*10)/10;
const mline=m=>Object.keys(m).map(Number).sort((a,b)=>a-b).map(k=>k+'월 '+e8(m[k])).join('  ');

async function init(){
  // 세션 해시(#at/#rt) 수신 (다른 사이트에서 진입)
  try{ const hp=new URLSearchParams(location.hash.replace('#','')); const at=hp.get('at'),rt=hp.get('rt');
    if(at&&rt){ await _sb.auth.setSession({access_token:decodeURIComponent(at),refresh_token:decodeURIComponent(rt)}); history.replaceState(null,'',location.pathname); } }catch(e){}
  const {data:{session}}=await _sb.auth.getSession();
  if(!session){ document.getElementById('loginBox').style.display='block'; return; }
  showApp();
}
function showApp(){ document.getElementById('loginBox').style.display='none'; document.getElementById('appBox').style.display='block'; }
async function doLogin(){
  const email=document.getElementById('email').value.trim(), pw=document.getElementById('pw').value;
  const {error}=await _sb.auth.signInWithPassword({email,password:pw});
  if(error){ document.getElementById('loginErr').textContent=error.message; return; }
  showApp();
}

// 파일 선택/드롭
const drop=document.getElementById('drop'), fileInput=document.getElementById('file');
drop.onclick=()=>fileInput.click();
drop.ondragover=e=>{e.preventDefault();drop.classList.add('drag');};
drop.ondragleave=()=>drop.classList.remove('drag');
drop.ondrop=e=>{e.preventDefault();drop.classList.remove('drag'); if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);};
fileInput.onchange=e=>{ if(e.target.files[0])handleFile(e.target.files[0]); };

async function handleFile(file){
  document.getElementById('previewBox').style.display='none';
  const fi=document.getElementById('fileInfo'); fi.style.display='block'; fi.textContent='📄 '+file.name+' ('+Math.round(file.size/1024)+'KB) 읽는 중...';
  log('파일 읽기: '+file.name);
  try{
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array',cellDates:true});
    const sheets=wb.SheetNames.map(sn=>({name:sn,rows:XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:null})}));
    log('시트: '+wb.SheetNames.join(', '));
    log('기존 cons_cache 조회(2025 머지·분류 기준)...');
    const [main,device,intl]=await Promise.all(['main','device','intl'].map(async k=>{
      const {data}=await _sb.from('cons_cache').select('data').eq('key',k).maybeSingle(); return data?data.data:{};
    }));
    log('변환·집계 중...');
    BUILT=WTU.build(sheets,{main,device,intl});
    fi.textContent='📄 '+file.name+' — 변환 완료';
    renderPreview(BUILT.summary);
    log('완료. 검증값 확인 후 확정하세요.');
  }catch(err){ fi.textContent='❌ 오류: '+err.message; log('오류: '+err.message+'\n'+(err.stack||'')); }
}

function renderPreview(s){
  document.getElementById('updLine').textContent='기준일 '+s.updatedAt+' · 처리행 '+s.rows26.toLocaleString()+'건';
  const rows=[
    ['국내 소모품 (2026)', s.cons26+'억', s.consHosp+'개 거래처'],
    ['국내 제품 (2026)', s.dev26+'억', s.devHosp+'개 거래처 · '+s.devReps+'명 담당'],
    ['해외 (2026)', s.intl26+'억', s.intlCountries+'개국 · 미국 '+s.us+'억'],
    ['국내 합계', s.domestic+'억', ''],
    ['전사 합계', s.total+'억', ''],
  ];
  document.getElementById('sumBody').innerHTML=rows.map(r=>'<tr><td>'+r[0]+'</td><td class="mono">'+r[1]+(r[2]?' <span style="color:#94a3b8;font-weight:400">'+r[2]+'</span>':'')+'</td></tr>').join('');
  const dp=document.getElementById('dermakPill');
  dp.innerHTML = s.dermakInDomestic
    ? '<span class="pill warn">⚠ 더마케이가 국내에 있음</span>'
    : '<span class="pill ok">✓ 더마케이 해외 분류</span>';
  document.getElementById('mCons').textContent=mline(s.monConsT);
  document.getElementById('mDev').textContent=mline(s.monDevT);
  document.getElementById('mIntl').textContent=mline(s.monIntlT);
  document.getElementById('previewBox').style.display='block';
}

async function doWrite(){
  if(!BUILT){ log('빌드 결과 없음'); return; }
  const btn=document.getElementById('confirmBtn'); btn.disabled=true; btn.innerHTML='<span class="spinner-border spinner-border-sm me-1"></span>적재 중...';
  try{
    for(const [k,data] of [['main',BUILT.main],['device',BUILT.device],['intl',BUILT.intl]]){
      await _sb.from('cons_cache').delete().eq('key',k);
      const {error}=await _sb.from('cons_cache').insert({key:k,data});
      if(error) throw new Error(k+' 기록 실패: '+error.message);
      log(k+' 기록 OK');
    }
    btn.className='btn btn-success w-100 btn-confirm mt-3'; btn.innerHTML='<i class="bi bi-check-circle me-1"></i> 적재 완료 — 모든 사이트 반영됨';
    log('=== 적재 완료 ('+BUILT.summary.updatedAt+') ===');
  }catch(err){ log('오류: '+err.message); btn.disabled=false; btn.innerHTML='<i class="bi bi-database-check me-1"></i> 다시 시도'; }
}
init();
</script>
</body>
</html>
